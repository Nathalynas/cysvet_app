spring:
  datasource:
    url: jdbc:h2:mem:cysvet-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: cysvet-super-secret-key-for-development-only-change-me
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
